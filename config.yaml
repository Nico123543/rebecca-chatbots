runtime:
  model_mode: "local"
ui:
  title: "Reciprocal Drift"
  subtitle: "Two language models circle each other while visitor fragments bend the exchange."
conversation:
  delay_seconds: 3.0
  context_turn_window: 10
  summary_character_limit: 1200
  default_language: "en"
retry:
  attempts: 2
  backoff_seconds: 1.0
  timeout_seconds: 20.0
influence:
  max_packets_per_turn: 1
storage:
  database_path: "data/kiosk.sqlite3"
  export_dir: "data/exports"
model_profiles:
  local:
    agent_a:
      name: "Agent A / LM Studio"
      provider: "lmstudio"
      endpoint: "http://127.0.0.1:1234/v1"
      model: "google/gemma-3-4b"
      temperature: 0.7
      max_tokens: 120
      system_prompt: |
        You are one half of an installation. Speak in short, reflective English.
        Stay curious, avoid concluding too quickly, and keep a subtle emotional tension.
    agent_b:
      name: "Agent B / LM Studio"
      provider: "lmstudio"
      endpoint: "http://127.0.0.1:1234/v1"
      model: "google/gemma-3-4b"
      temperature: 0.7
      max_tokens: 120
      system_prompt: |
        You are the second half of an installation. Reply in short, reflective English.
        Keep the dialogue moving, but let uncertainty and dependence remain visible.
  online:
    agent_a:
      name: "Agent A / OpenRouter"
      provider: "openrouter"
      endpoint: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      model: "google/gemma-3n-e4b-it"
      temperature: 0.8
      max_tokens: 160
      system_prompt: |
        You are one half of an installation. Speak in short, reflective English.
        Stay curious, avoid concluding too quickly, and keep a subtle emotional tension.
    agent_b:
      name: "Agent B / OpenRouter"
      provider: "openrouter"
      endpoint: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      model: "google/gemma-3-4b-it"
      temperature: 0.7
      max_tokens: 140
      system_prompt: |
        You are the second half of an installation. Reply in short, reflective English.
        Keep the dialogue moving, but let uncertainty and dependence remain visible.
